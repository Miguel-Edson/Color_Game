<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Matcher</title>
<style>
  body { 
    font-family: system-ui, -apple-system, sans-serif; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    background-color: #1a1a1a; 
    color: #f3f4f6; 
    padding: 40px 20px; 
  }
  .container { 
    display: flex; 
    gap: 40px; 
    margin-bottom: 20px; 
    margin-top: 20px;
  }
  .box-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .color-box { 
    width: 200px; 
    height: 200px; 
    border-radius: 16px; 
    border: 3px dashed #4b5563; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    text-align: center; 
    overflow: hidden; 
    background-color: #374151; 
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  }
  .color-box.solid { border-style: solid; }
  #pasted-canvas { 
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
    display: none; 
  }
  #paste-text { color: #9ca3af; font-weight: bold; }
  
  /* Estilos do novo botão */
  button {
    margin-bottom: 20px;
    padding: 12px 32px;
    font-size: 1.2em;
    font-weight: bold;
    color: white;
    background-color: #3b82f6;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
  }
  button:hover:not(:disabled) { background-color: #2563eb; transform: scale(1.05); }
  button:active:not(:disabled) { transform: scale(0.95); }
  button:disabled { background-color: #4b5563; color: #9ca3af; cursor: not-allowed; box-shadow: none; }

  .info { 
    text-align: center; 
    background: #374151;
    padding: 20px 40px;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    min-width: 250px;
  }
  .info div { margin: 8px 0; font-size: 1.1em; }
  #result { 
    font-size: 1.8em; 
    font-weight: 800; 
    margin-top: 15px; 
    color: #f3f4f6; 
  }
</style>
</head>
<body>

  <h1>O Quão Bom é o seu Olho? 👀</h1>
  <p>Vá em um color picker, escolha a cor, tire um print e dê <strong>Ctrl+V</strong> na página.</p>

  <div class="container">
    <div class="box-wrapper">
      <h3>Cor Alvo</h3>
      <div id="target-color" class="color-box solid"></div>
    </div>
    <div class="box-wrapper">
      <h3>Sua Cor (Cole Aqui)</h3>
      <div id="user-color" class="color-box">
        <span id="paste-text">Ctrl + V</span>
        <canvas id="pasted-canvas"></canvas>
      </div>
    </div>
  </div>

  <button id="analyze-btn" disabled>Cole uma imagem primeiro</button>

  <div class="info">
    <div id="target-rgb">Alvo: RGB(?, ?, ?)</div>
    <div id="user-rgb">Sua Cor: RGB(?, ?, ?)</div>
    <div id="result">Precisão: ???</div>
  </div>

<script>
  let targetRGB = [0, 0, 0];
  let currentUserRGB = null; // Variável global para guardar a cor colada

  function init() {
    targetRGB = [
      Math.floor(Math.random() * 256),
      Math.floor(Math.random() * 256),
      Math.floor(Math.random() * 256)
    ];
    document.getElementById('target-color').style.backgroundColor = `rgb(${targetRGB[0]}, ${targetRGB[1]}, ${targetRGB[2]})`;
    
    // Reseta a interface
    document.getElementById('target-rgb').innerText = `Alvo: RGB(?, ?, ?)`;
    document.getElementById('user-rgb').innerText = `Sua Cor: RGB(?, ?, ?)`;
    document.getElementById('result').innerText = `Precisão: ???`;
    document.getElementById('result').style.color = '#f3f4f6';
    document.getElementById('analyze-btn').disabled = true;
    document.getElementById('analyze-btn').innerText = "Cole uma imagem primeiro";
    currentUserRGB = null;
  }

  window.addEventListener('paste', e => {
    const items = e.clipboardData.items;
    for (let i = 0; i < items.length; i++) {
      if (items[i].type.indexOf('image') !== -1) {
        const blob = items[i].getAsFile();
        const img = new Image();
        img.onload = () => processImage(img);
        img.src = URL.createObjectURL(blob);
        break; 
      }
    }
  });

  function processImage(img) {
    const canvas = document.getElementById('pasted-canvas');
    const ctx = canvas.getContext('2d');
    const pasteText = document.getElementById('paste-text');
    const userColorBox = document.getElementById('user-color');
    
    pasteText.style.display = 'none';
    canvas.style.display = 'block';
    userColorBox.style.borderStyle = 'solid';
    
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    
    let r = 0, g = 0, b = 0;
    const pixelCount = canvas.width * canvas.height;

    for (let i = 0; i < data.length; i += 4) {
      r += data[i];
      g += data[i+1];
      b += data[i+2];
    }
    
    // Salva a cor do usuário, mas ainda NÃO mostra na tela
    currentUserRGB = [
      Math.round(r / pixelCount),
      Math.round(g / pixelCount),
      Math.round(b / pixelCount)
    ];

    // Habilita o botão para o usuário clicar
    const btn = document.getElementById('analyze-btn');
    btn.disabled = false;
    btn.innerText = "Revelar Precisão!";
  }

  // Evento de clique no botão
  document.getElementById('analyze-btn').addEventListener('click', () => {
    if (!currentUserRGB) return;

    // 1. Revela a cor alvo
    document.getElementById('target-rgb').innerText = `Alvo: RGB(${targetRGB[0]}, ${targetRGB[1]}, ${targetRGB[2]})`;
    
    // 2. Revela a cor do usuário
    document.getElementById('user-rgb').innerText = `Sua Cor: RGB(${currentUserRGB[0]}, ${currentUserRGB[1]}, ${currentUserRGB[2]})`;
    
    // 3. Faz o cálculo e revela a precisão
    calculateAccuracy(currentUserRGB);

    // Opcional: Desabilita o botão após clicar para evitar cliques repetidos
    document.getElementById('analyze-btn').disabled = true;
    document.getElementById('analyze-btn').innerText = "Análise Concluída";
  });

  function calculateAccuracy(userRGB) {
    const diffR = targetRGB[0] - userRGB[0];
    const diffG = targetRGB[1] - userRGB[1];
    const diffB = targetRGB[2] - userRGB[2];
    
    const distance = Math.sqrt((diffR * diffR) + (diffG * diffG) + (diffB * diffB));
    const maxDistance = 441.67295593; 
    
    let accuracy = 100 - ((distance / maxDistance) * 100);
    accuracy = Math.max(0, accuracy); 

    const resultElement = document.getElementById('result');
    resultElement.innerText = `Precisão: ${accuracy.toFixed(2)}%`;

    if (accuracy > 95) resultElement.style.color = '#4ade80'; 
    else if (accuracy > 80) resultElement.style.color = '#fbbf24'; 
    else resultElement.style.color = '#ef4444'; 
  }

  init();
</script>
</body>
</html>
